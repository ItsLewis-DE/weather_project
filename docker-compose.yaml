services:
    db:
        container_name: postgres_container
        image: postgres:15.17
        ports:
            - 5433:5432
        environment:
            POSTGRES_DB: weather_project
            POSTGRES_USER: phongthanh
            POSTGRES_PASSWORD: thangkhung0993
        volumes:
            - ./postgres/data:/var/lib/postgresql/data
            - ./postgres/airflow_init.sql:/docker-entrypoint-initdb.d/airflow_init.sql
        networks:
            - my-network
    air_flow:
        container_name: airflow_container
        image: apache/airflow:3.2.0
        ports:
            - 8000:8080
        environment:
            AIRFLOW_DATABASE_SQL_ALCHEMY_CONN: postgres+psycopg2://airflow:airflow@db:5432/airflow_db
        depends_on:
            - db
        networks:
            - my-network
        command: >
            bash -c "airflow db migrate && airflow standalone"

networks:
    my-network:
        driver: bridge